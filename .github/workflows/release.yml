name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build package
        run: sbt universal:packageBin
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: target/universal/*.zip
